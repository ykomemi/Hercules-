<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Hercules" />
    <meta
      name="description"
      content="Your personal fitness trainer — built for young champions"
    />
    <title>Hercules Fitness</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div id="preloader" aria-hidden="true">
      <div class="preloader-wordmark">
        <span>H</span><span>E</span><span>R</span><span>C</span><span>U</span><span>L</span><span>E</span><span>S</span>
      </div>
      <img src="icons/splash-logo.svg" class="preloader-logo" alt="" />
    </div>

    <div id="app">
      <div id="view" class="view"></div>
      <nav id="bottom-nav" class="bottom-nav"></nav>
    </div>

    <!-- Dialog -->
    <div id="app-dialog" class="dialog-overlay" style="display:none" aria-modal="true" role="dialog">
      <div class="dialog-box">
        <div class="dialog-title" id="dialog-title"></div>
        <div class="dialog-message" id="dialog-message"></div>
        <div class="dialog-actions">
          <button class="dialog-btn dialog-btn-cancel" id="dialog-cancel">Cancel</button>
          <button class="dialog-btn dialog-btn-confirm" id="dialog-confirm">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Exercise preview dialog -->
    <div id="ex-preview-dialog" class="dialog-overlay" style="display:none" aria-modal="true" role="dialog">
      <div class="dialog-box ex-preview-box">
        <div class="ex-preview-name" id="ex-preview-name"></div>
        <div class="ex-preview-media" id="ex-preview-media"></div>
        <button class="ex-preview-add" id="ex-preview-add">Add Exercise</button>
        <button class="ex-preview-cancel" id="ex-preview-cancel">Cancel</button>
      </div>
    </div>

    <!-- Pre-exercise countdown overlay -->
    <div id="countdown-overlay" style="display:none" aria-live="assertive">
      <div class="countdown-ex-name" id="countdown-ex-name"></div>
      <div class="countdown-ring">
        <svg viewBox="0 0 180 180" style="width:180px;height:180px">
          <circle cx="90" cy="90" r="80" stroke="#2a2a2a" stroke-width="10" fill="none"/>
          <circle id="cd-ring-circle" cx="90" cy="90" r="80"
            stroke="#C8FF00" stroke-width="10" fill="none"
            stroke-dasharray="502.65"
            stroke-dashoffset="0"
            stroke-linecap="round"/>
        </svg>
        <div class="countdown-number" id="countdown-number">3</div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <audio id="session-audio" src="audio/aud-default.MP3" preload="auto" loop></audio>

    <script src="js/exercises.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
